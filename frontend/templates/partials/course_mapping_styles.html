<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>

        right: 10px;

        background: rgba(255, 255, 255, 0.95);

        border-radius: 4px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);

        background: #ecf0f1;

        font-size: 0.875rem;
    }

        background: #ecf0f1;
    }

    #course-toolbar button:disabled {
        opacity: 0.6;
        cursor: not-allowed;

        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        font-size: 0;
        vertical-align: middle;

    .location-pin-circle > div { cursor: pointer; }
    .turnaround-marker { background: transparent !important; border: none !important; }
    .turnaround-marker > div { cursor: move; }
    .uturn-icon { background: transparent !important; border: none !important; }

        font-size: 1.09rem;
        line-height: 1.45;
        min-width: 250px;

    .course-map-popup, .leaflet-popup-content .course-map-popup {
        font-family: Arial, sans-serif;
        font-size: 1.09rem;
        line-height: 1.45;
        min-width: 250px;
        max-width: 350px;

        margin-top: 0.35rem;

    #course-edit-toolbar button { padding: 0.44rem 0.75rem; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 1.09rem; color: #000; }
    #course-edit-toolbar button:hover:not(:disabled) { background: #ecf0f1; }
    #course-edit-toolbar button:disabled { opacity: 0.6; cursor: not-allowed; }
    #course-edit-toolbar button.active { background: #3498db; color: #fff; border-color: #2980b9; }

    .pin-link { background: none; border: none; padding: 0; font-size: inherit; color: #2980b9; cursor: pointer; text-decoration: none; }
    .pin-link:hover { text-decoration: underline; }
    /* Pin labels in tables: left-align (buttons default to center-aligned text) */
    #segments-table .pin-link { text-align: left; }
    #locations-table .loc-id-link {
        background: none;
        border: none;
        padding: 0;
        font-size: inherit;
        color: #2980b9;
        cursor: pointer;
        text-decoration: underline;
        font-weight: 600;
    }
    #locations-table .loc-id-link:hover { color: #1a5276; }
    #locations-table tr.locations-totals-row td {
        font-weight: 600;
        border-top: 2px solid #bdc3c7;
        background: #f8f9fa;
    }
    #locations-table tr.locations-totals-row td:first-child {
        color: #2c3e50;
    }

        padding: 1rem 1.25rem;
    }
    .config-package-details-body {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 0.65rem;
    }
    @media (min-width: 640px) {
        .config-package-details-body {
            grid-template-columns: minmax(0, 1.4fr) minmax(0, 2fr);
            gap: 0.5rem 1.25rem;
        }
        .config-package-field-id {
            grid-column: 1 / -1;
        }
    }
    .config-package-field {
        display: grid;
        grid-template-columns: 6.5rem minmax(0, 1fr);
        gap: 0.35rem 0.75rem;
        align-items: baseline;
    }
    .config-package-label {
        font-weight: 600;
        color: #7f8c8d;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.02em;
    }
    .config-package-id-value {
        font-size: 0.85rem;
        color: #5d6d7e;
        word-break: break-all;
    }
    .config-package-value {
        color: #2c3e50;
        font-size: 1rem;
    }
    .config-package-value-multiline {
        white-space: pre-wrap;
    }
    .config-package-input {

        border: 1px solid #ddd;
        border-radius: 4px;

        min-height: 2.5em;
    }

    #race-config-workspace .course-map-header-top {
        display: none !important;
    }
    #race-config-workspace .course-from-map-title {
        margin: 0 0 0.25rem 0;
        font-size: 1.1rem;
        color: #2c3e50;
    }
    #race-config-workspace .course-from-map-lead {
        margin: 0 0 0.75rem 0;
        font-size: 0.875rem;
        color: #7f8c8d;
    }

        padding-top: 1.25rem;

    }
    #course-from-map-card .course-derived-heading {
        margin: 0 0 0.5rem 0;
        font-size: 1rem;
        color: #2c3e50;
    }

        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
    }
    #course-from-map-card .course-derived-heading-row .course-derived-heading {
        margin: 0;
    }
    #course-from-map-card .course-derived-empty {

        text-align: left;
        white-space: nowrap;
    }

    .course-map-action-text-btn {
        padding: 0.35rem 0.65rem;
        border: 1px solid #bdc3c7;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        font-size: 0.875rem;
    }
    .course-map-action-text-btn:hover { background: #ecf0f1; }

        align-items: center;
        justify-content: center;
        padding: 1rem;
    }
    .course-location-modal[hidden] { display: none !important; }
    .course-location-modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);

        cursor: pointer;
        color: #7f8c8d;
    }
    .course-location-modal-body label {
        display: block;
        font-weight: 600;
        font-size: 0.875rem;
        margin-top: 0.65rem;
        color: #2c3e50;
    }
    .course-location-modal-body input,
    .course-location-modal-body select,
    .course-location-modal-body textarea {
        width: 100%;

        margin-top: 0.25rem;
        padding: 0.4rem 0.5rem;
        font-size: 0.875rem;
        border: 1px solid #ddd;
        border-radius: 4px;
    }
    .location-editor-section {
        margin-bottom: 1rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid #eee;
    }
