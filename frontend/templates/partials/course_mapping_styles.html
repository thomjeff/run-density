<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    #course-mapping-map {
        height: 750px;
        border-radius: 4px;
        overflow: hidden;
        position: relative;
        background: transparent !important;
    }

    .map-loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(255, 255, 255, 0.9);
        padding: 1rem 2rem;
        border-radius: 4px;
        font-weight: 500;
        color: #666;
        z-index: 1000;
    }

    /* Above Leaflet overlay pane (400) and all map content so course line never draws behind buttons */
    #basemap-toggle {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 10000;
        background: rgba(255, 255, 255, 0.95);
        padding: 0.5rem 0.75rem;
        border-radius: 4px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        display: flex;
        gap: 0.25rem;
    }

    #basemap-toggle button {
        padding: 0.35rem 0.6rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        font-size: 0.875rem;
    }

    #basemap-toggle button.active {
        background: #3498db;
        color: #fff;
        border-color: #2980b9;
    }

    #basemap-toggle button:hover:not(.active) {
        background: #ecf0f1;
    }

    #course-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1rem;
    }

    #course-toolbar button {
        padding: 0.4rem 0.75rem;
        border: 1px solid #bdc3c7;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        font-size: 0.875rem;
    }

    #course-toolbar button:hover {
        background: #ecf0f1;
    }

    #course-toolbar button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    #course-toolbar button.active {
        background: #3498db;
        color: #fff;
        border-color: #2980b9;
    }

    #course-toolbar .course-id {
        font-size: 0.875rem;
        color: #7f8c8d;
    }

    #course-toolbar .toolbar-check {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.875rem;
        color: #555;
        cursor: pointer;
    }
    #course-toolbar .toolbar-check input { cursor: pointer; }

    /* Segments table: compact padding, left-align all columns; Action column icon buttons */
    #segments-table th,
    #segments-table td {
        padding: 0.35rem 0.5rem;
        text-align: left;
    }
    #segment-pins-table th,
    #segment-pins-table td {
        text-align: left;
        padding: 0.35rem 0.5rem;
    }
    .course-map-action-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        padding: 0;
        margin: 0 2px;
        border: 1px solid #bdc3c7;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        font-size: 0;
        vertical-align: middle;
    }
    .course-map-action-btn:hover {
        background: #ecf0f1;
        border-color: #95a5a6;
    }
    .course-map-action-btn svg {
        width: 16px;
        height: 16px;
        pointer-events: none;
    }
    #segments-table td.course-map-action-cell,
    #segment-pins-table td.course-map-action-cell {
        white-space: nowrap;
    }

    .segment-pin-square { background: transparent !important; border: none !important; }
    .segment-pin-square > div { cursor: pointer; }
    .segment-info-icon { background: transparent !important; border: none !important; }
    .segment-info-icon > div { cursor: pointer; }
    .start-finish-icon { background: transparent !important; border: none !important; }
    .start-finish-icon > div { cursor: default; }
    #course-mapping-map.course-mapping-edit-mode .start-finish-icon > div { cursor: move; }
    .uturn-icon > div { cursor: default; }
    #course-mapping-map.course-mapping-edit-mode .uturn-icon > div { cursor: move; }
    .location-pin-circle { background: transparent !important; border: none !important; }
    .location-pin-circle > div { cursor: pointer; }
    .turnaround-marker { background: transparent !important; border: none !important; }
    .turnaround-marker > div { cursor: move; }
    .uturn-icon { background: transparent !important; border: none !important; }
    /* Course map popups: match Locations UI (shared styles in common.css for tooltips) */
    .course-map-popup, .leaflet-popup-content .course-map-popup {
        font-family: Arial, sans-serif;
        font-size: 0.875rem;
        line-height: 1.4;
        min-width: 200px;
        max-width: 280px;
    }
    .course-map-popup .popup-row { margin-bottom: 0.5rem; }
    .course-map-popup .popup-row:last-child { margin-bottom: 0; }
    .course-map-popup .popup-label { font-weight: 600; color: #2c3e50; font-size: 0.875rem; }
    .course-map-popup .popup-value { color: #34495e; font-size: 0.875rem; }
    .course-map-popup .popup-heading { margin: 0 0 0.5rem 0; font-size: 1rem; color: #2c3e50; font-weight: 600; }
    .course-map-popup-wrap { font-size: 0.875rem; }
    .course-map-popup input, .course-map-popup select, .course-map-popup textarea,
    .course-map-popup-wrap input, .course-map-popup-wrap select, .course-map-popup-wrap textarea,
    .leaflet-popup-content input, .leaflet-popup-content select, .leaflet-popup-content textarea {
        margin: 5px !important;
        font-size: 0.875rem;
    }
    #course-list-table tbody tr.course-row { cursor: pointer; }
    #course-list-table tbody tr.course-row.selected { background: #e3f2fd; }
    .course-label { font-weight: 600; color: #2c3e50; margin-right: 0.25rem; }
    #course-map-header-buttons button { padding: 0.4rem 0.75rem; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 0.875rem; color: #000; }
    #course-map-header-buttons button:hover { background: #ecf0f1; }
    #course-map-header-buttons button:disabled { opacity: 0.6; cursor: not-allowed; }
    #course-map-header-buttons button.active { background: #3498db; color: #fff; border-color: #2980b9; }
    #btn-delete-course { background: #e8e8e8 !important; color: #c0392b !important; border-color: #bdc3c7 !important; }
    #btn-delete-course:hover:not(:disabled) { background: #ddd !important; }
    /* Edit toolbar: same look as Street/Satellite buttons */
    #course-edit-toolbar button { padding: 0.35rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 0.875rem; color: #000; }
    #course-edit-toolbar button:hover:not(:disabled) { background: #ecf0f1; }
    #course-edit-toolbar button:disabled { opacity: 0.6; cursor: not-allowed; }
    #course-edit-toolbar button.active { background: #3498db; color: #fff; border-color: #2980b9; }
    /* Segments table: clickable From/To pin labels open pin popup on map */
    .pin-link { background: none; border: none; padding: 0; font-size: inherit; color: #2980b9; cursor: pointer; text-decoration: none; }
    .pin-link:hover { text-decoration: underline; }
    /* Pin labels in tables: left-align (buttons default to center-aligned text) */
    #segments-table .pin-link,
    #segment-pins-table .pin-link { text-align: left; }
</style>
